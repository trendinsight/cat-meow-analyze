name: cat-meow-analyze

on:
  repository_dispatch:
    types: [new-clip]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      clip_id:
        description: "처리할 클립 ID (비우면 미분석 전체 처리)"
        required: false
        default: ""

concurrency:
  group: cat-meow-analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: ffmpeg 설치
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 클립 처리
        env:
          SITE_BASE: ${{ secrets.SITE_BASE }}
          CAT_NAME: ${{ secrets.CAT_NAME }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            python process_clip.py --clip-id "${{ github.event.client_payload.clip_id }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.clip_id }}" ]; then
            python process_clip.py --clip-id "${{ github.event.inputs.clip_id }}"
          else
            python process_clip.py --all-pending
          fi

      - name: 누적 기록 커밋
        run: |
          if [ -f history.json ]; then
            git config user.name "cat-meow-bot"
            git config user.email "bot@users.noreply.github.com"
            git add history.json
            git commit -m "update history [skip ci]" || echo "변경 없음"
            git push || echo "푸시 생략"
          fi
